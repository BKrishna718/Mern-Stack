<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
            background: whitesmoke;
        }
        .box{
            border: 4px solid red;
            width: 80%;
            max-width: 500px;
            margin: 50px auto;
            background: rgb(18, 247, 140);
        }
        .loader1{
            margin: auto;
            height: 200px;
            width: 200px;
            border-radius: 50%;
            border: 20px solid rgb(139, 131, 131);
            border-top-color: rgb(185, 174, 10);
            animation: rot0 1s infinite;
        }
        @keyframes rot0 {
            from{
                transform: rotate(0)
            }to{
                transform: rotate(360deg);
            }
            
        }
        .box1{
            border: 4px solid rgb(99, 79, 49);
            width: 80%;
            max-width: 500px;
            margin: 50px auto;
            background: rgb(206, 203, 9);
        }
        
        .loader2 .body{
            display: flex;
            align-items: center;
            justify-self: center;
            height: 100vh;

        }
        .loader2{
            margin: auto;
            height: 200px;
            width: 200px;
            border-top: 10px solid red;
            border-left: 10px solid red;
            border-bottom: 10px solid red;
            border-radius: 50%;
            animation: rot1 1s infinite;
         
        }
        @keyframes rot1 {
            from{
                transform: rotate(0deg)
            }
            to{
                transform: rotate(360deg);
            }
            
        }
        .loader3{
            position: relative;
            display: flex;
            text-align: center;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .ring{
            position: absolute;
            margin: auto;
            height: 250px;
            width: 250px;
            border-radius: 50%;
            animation: ring 1s infinite; 
        }

        .ring::before{
            position: absolute;
            content: '';
            left: 0;
            top:0;
            height: 100%;
            width: 100%;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255,255,255,0.3);

        }
        span{
            color: #737373;
            font-size: 20px;
            letter-spacing: 1px;
            line-height: 200px;
            animation: word 2s ease-in-out infinite;
        }

        @keyframes word{
            50%{
                color:black
            }
            
        }

        @keyframes ring{
            0%{
                transform: rotate(0deg);
                box-shadow: 1px 5px 2px #c2af0b;
            }
            50%{
                transform: rotate(180deg);
                box-shadow: 1px 5px 2px #073303;
            }
            100%{
                transform: rotate(360deg);
                box-shadow: 1px 5px 2px #8a580d;
            }
            
        }
        .box3{
            border: 4px solid black;
            width: 80%;
            max-width: 120px;
            margin: 50px auto;
            /* background: rgb(22, 223, 206); */
        }

        .loader4{
        width: 120px;
        height: 20px;
        background-image: linear-gradient(red,red);
        background-position: left;
        background-size: 20px 20px;
        background-repeat: no-repeat;
        background-color: gainsboro;
        animation: line 1s infinite linear;
        }

        @keyframes line{
        50% {
            background-position: right
        }
        }

    </style>
</head>
<body>
    <div class="box">
    <div class="loader1"></div>
    </div>

    <br>

    <div class="box1">
    <div class="loader2"></div>
    </div>

    <br>

    <div class="loader3">

        <div class="ring"></div>
        <span>loading...</span>

    </div>
     
    <div class="box3">

        <div class="loader4"></div>
    
    </div>

</body>
</html>
